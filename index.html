<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Skills Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body{
            font-family: Lexend, sans-serif;
            background-image: url(bgimg.jpg);
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        nav{
            width: 100%;
            background-color: rgba(0,0,0,0.75);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 24px;
            position: fixed;
            top: 0;
            left: 0;
        }
        .nav-logo{
            color: white;
            font-size: 14px;
            font-weight: bold;
        }
        nav a{
            color: white;
            font-size: 13px;
        }
        .form-container{
            background-color: #f2c874;
            padding: 20px 30px;
            width: 480px;
            max-width: 95vw;
            border-radius: 10px;
            margin-top: 60px;
        }
        h1{
            text-align: center;
            margin-bottom: 10px;
        }
        h2{
            font-size: 15px;
            margin: 14px 0 6px;
        }
        label{
            font-weight: bold;
            margin: 10px 0 5px;
            display: block;
            font-size: 14px;
        }
        input, select, button{
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            font-family: Lexend, sans-serif;
        }
        .photo-circle{
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background-color: #e0a830;
            overflow: hidden;
            display: inline-block;
            vertical-align: middle;
            margin-right: 14px;
            border: 2px solid #b5975c;
        }
        .photo-circle img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #photoInput{
            display: none;
        }
        .inline{
            display: flex; 
            gap: 10px;
        }
        .inline>div{
            flex: 1;
        }
        .checkbox-row{
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        .checkbox-row input{
            width: auto;
            margin: 0;
        }
        .checkbox-row a {
            color: #73603b;
        }
        .formbuttons {
            display: flex; gap: 10px;
        }
        button{
            background: #b5975c;
            color: black;
            cursor: pointer;
            border: none;
            transition: background 0.3s;
        }
        button:hover{
            background: #73603b;
        }
        footer{
            width: 100%;
            background-color: rgba(0,0,0,0.75);
            text-align: center;
            font-size: 12px;
            padding: 10px;
            color: white;
            position: fixed;
            bottom: 0;
            left: 0;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">⚗ ScienceFair</div>
        <div>
            <button style="width:auto; padding:5px 14px; font-size:12px;" onclick="alert('Please register first.')">Register</button>
            <button style="width:auto; padding:5px 14px; font-size:12px; background:#f2c874;" onclick="alert('Please register first to submit an entry.')">Submit Entry</button>
        </div>
    </nav>

    <div class="form-container">

        <h1>REGISTRATION</h1>

        <p style="font-size:13px; margin-bottom:16px;">
            <a href="https://www.w3schools.com/html/html_forms.asp" target="_blank" style="color:#73603b; font-weight:bold;">* Instructions</a>
            — Fill out all required fields and click Submit to finish your registration.
        </p>

        <label>Profile Photo</label>
        <div style="display:flex; align-items:center; gap:14px; margin-bottom:14px;">
            <div class="photo-circle" id="photoCircle"></div>
            <div>
                <input type="file" id="photoInput" accept="image/*" onchange="uploadPhoto()">
                <span id="fileName" style="font-size:12px;">No file chosen</span><br>
                <button onclick="document.getElementById('photoInput').click()" style="width:auto; margin-top:6px;">Upload Photo</button>
            </div>
        </div>

        <h2>Personal Details</h2>

        <div class="inline">
            <div>
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" placeholder="First Name">
            </div>
            <div>
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" placeholder="Last Name">
            </div>
        </div>

        <div class="inline">
            <div>
                <label for="age">Age</label>
                <input type="number" id="age" min="1" max="17" placeholder="1-17">
            </div>
            <div>
                <label for="contact">Contact Number</label>
                <input type="text" id="contact" placeholder="Contact Number">
            </div>
        </div>

        <label for="grade">Grade Level</label>
        <select id="grade">
            <option value="">-- Select Grade Level --</option>
            <option value="7">Grade 7</option>
            <option value="8">Grade 8</option>
            <option value="9">Grade 9</option>
            <option value="10">Grade 10</option>
        </select>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="example@email.com">

        <label for="project">Project Title</label>
        <input type="text" id="project" placeholder="Enter your project title">

        <label for="category">Science Category</label>
        <select id="category">
            <option value="bio">Biology</option>
            <option value="chem">Chemistry</option>
            <option value="phys">Physics</option>
            <option value="cs">Computer Science</option>
            <option value="env">Environmental Science</option>
            <option value="other">Other</option>
        </select>
        
        <label for="pin">Create PIN</label>
        <input type="password" id="pin" placeholder="4-digit PIN" maxlength="4">

        <label for="confirmPin">Confirm PIN</label>
        <input type="password" id="confirmPin" placeholder="Confirm PIN" maxlength="4">

        <div class="checkbox-row">
            <input type="checkbox" id="terms">
            <label for="terms" style="margin:0; font-weight:normal;">
                I accept the <a href="https://www.w3schools.com" target="_blank" style="color:#73603b;">Terms of Use and Privacy Policy</a>
            </label>
        </div>

        <div class="formbuttons">
            <button onclick="register()">Create my account</button>
            <button onclick="cancelForm()" style="background:#cca96a;">Cancel</button>
        </div>

    </div>

    <footer>Francisco &copy; 2026</footer>

    <script>

        function uploadPhoto() {
            let file = document.getElementById("photoInput").files[0];
            if (file) {
                document.getElementById("fileName").innerHTML = file.name;
                let reader = new FileReader();
                reader.onload = function() {
                    document.getElementById("photoCircle").innerHTML = "<img src='" + reader.result + "'>";
                };
                reader.readAsDataURL(file);
                alert("Your profile pic has been uploaded.");
            }
        }

        function register() {
            let firstName  = document.getElementById("firstName").value;
            let lastName   = document.getElementById("lastName").value;
            let age        = Number(document.getElementById("age").value);
            let contact    = document.getElementById("contact").value;
            let email      = document.getElementById("email").value;
            let project    = document.getElementById("project").value;
            let grade      = document.getElementById("grade").value;
            let pin        = document.getElementById("pin").value;
            let confirmPin = document.getElementById("confirmPin").value;
            let termsChecked = document.getElementById("terms").checked;

            if (firstName == "" || lastName == "" || document.getElementById("age").value == "" || contact == "" || email == "" || project == "" || grade == "" || pin == "" || confirmPin == "") {
                alert("Please fill out all fields.");
                return;
            }

            if (age > 17) {
                alert("Age must be 17 or below to register.");
                return;
            }

            if (age < 1) {
                alert("Please enter a valid age.");
                return;
            }

            if (grade == "7") {
                if (age < 12 || age > 13) {
                    alert("Grade 7 students should be 12 to 13 years old.");
                    return;
                }
            } else if (grade == "8") {
                if (age < 13 || age > 14) {
                    alert("Grade 8 students should be 13 to 14 years old.");
                    return;
                }
            } else if (grade == "9") {
                if (age < 14 || age > 15) {
                    alert("Grade 9 students should be 14 to 15 years old.");
                    return;
                }
            } else if (grade == "10") {
                if (age < 15 || age > 17) {
                    alert("Grade 10 students should be 15 to 17 years old.");
                    return;
                }
            }

            if (pin.length < 4) {
                alert("PIN must be exactly 4 digits.");
                return;
            }

            if (pin != confirmPin) {
                alert("PINs do not match. Please try again.");
                return;
            }

            if (termsChecked == false) {
                alert("Please accept the Terms of Use and Privacy Policy.");
                return;
            }

            alert("Registration successful!" + "\n\nName: " + firstName + " " + lastName + "\nGrade: " + grade + "\nAge: " + age + "\nProject: " + project + "\n\nWelcome to the Science Fair!");
        }

        function cancelForm() {
            let confirmed = window.confirm("Are you sure you want to cancel?");
            if (confirmed == true) {
                document.getElementById("firstName").value  = "";
                document.getElementById("lastName").value   = "";
                document.getElementById("age").value        = "";
                document.getElementById("contact").value    = "";
                document.getElementById("email").value      = "";
                document.getElementById("project").value    = "";
                document.getElementById("grade").value      = "";
                document.getElementById("pin").value        = "";
                document.getElementById("confirmPin").value = "";
                document.getElementById("terms").checked    = false;
                document.getElementById("photoCircle").innerHTML = "";
                document.getElementById("fileName").innerHTML    = "No file chosen";
                alert("Form cleared.");
            }
        }

    </script>

</body>
</html>
